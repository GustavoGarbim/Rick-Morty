<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Localizações - Rick and Morty</title>
    <link rel="icon" type="image/ico" href="./icon.png"/>
    <link rel="stylesheet" href="style.css" />
    <script src="localizacoes.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <header class="top-header">
        <button id="btnMenuToggle" class="btn-menu">☰</button>
        <div class="brand">
          <span class="icon">📍</span>
          <h1>Rick and Morty</h1>
        </div>

        <nav class="main-nav">
          <a href="personagens.html">Personagens</a>
          <a href="episodios.html">Episódios</a>
          <a href="localizacoes.html" class="active">Localizações</a>
        </nav>
        <div class="datetime-display" id="datetimeDisplay"></div>
      </header>

      <div id="sidebar" class="sidebar">
        <h2>Filtros de Localizações</h2>

        <div class="filter-group">
          <label>
            Nome do Localização
            <input type="text" id="searchName" placeholder="Ex: Citadel of Ricks" />
          </label>
        </div>

        <div class="filter-group">
          <label>
            Tipo
            <input type="text" id="searchType" placeholder="Ex: Planet" />
          </label>
        </div>

        <div class="filter-group">
          <label>
            Dimensão
            <input type="text" id="searchDimension" placeholder="Ex: Dimension C-137" />
          </label>
        </div>

        <div class="filter-actions">
          <button id="btnApplyFilters" class="btn-primary">Aplicar</button>
          <button id="btnClearFilters" class="btn-secondary">Limpar</button>
        </div>
      </div>

      <main class="main-content">
        <div id="uiStateContainer" class="ui-state hidden"></div>

        <div id="cardsContainer" class="cards-grid"></div>

        <div id="paginationContainer" class="pagination hidden">
          <button id="btnPrevPage" class="btn-secondary" disabled>
            Anterior
          </button>
          <span class="page-info"
            >Página <span id="currentPage">1</span> de
            <span id="totalPages">1</span></span
          >
          <button id="btnNextPage" class="btn-secondary">Próxima</button>
        </div>
      </main>
    </div>
  </body>
</html>
